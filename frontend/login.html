<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-[#020617] text-white min-h-screen flex items-center justify-center relative overflow-x-hidden">

    <!-- Background Particles Placeholder -->
    <div class="absolute inset-0 z-0">
        <canvas id="particle-canvas" class="w-full h-full"></canvas>
    </div>

    <!-- Glowing Orbs -->
    <div
        class="fixed top-[-10%] left-[-10%] w-[40%] h-[40%] bg-indigo-600/20 rounded-full blur-[120px] pointer-events-none z-0">
    </div>
    <div
        class="fixed bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-cyan-600/20 rounded-full blur-[120px] pointer-events-none z-0">
    </div>

    <div class="max-w-6xl w-full mx-auto p-4 md:p-8 grid md:grid-cols-2 gap-12 items-center relative z-10 z-[100]">

        <!-- Branding Area -->
        <div class="space-y-8 max-w-lg mb-8 md:mb-0">
            <!-- Logo Removed Per User Request -->

            <div class="space-y-4">
                <h1 class="text-6xl md:text-7xl font-bold tracking-tight text-white drop-shadow-md">
                    UniCollab<span class="text-cyan-400">.</span>
                </h1>
                <p class="text-xl text-slate-400 font-light leading-relaxed max-w-md">
                    Find teammates. Build ideas. <span class="text-white font-medium">Create the future.</span>
                </p>
            </div>
        </div>

        <!-- Login Form Area -->
        <div class="glass-panel p-8 sm:p-10 rounded-2xl shadow-2xl relative overflow-hidden group">
            <h2 class="text-2xl font-bold text-white mb-2">Welcome</h2>
            <p class="text-sm text-slate-400 mb-8 border-b border-indigo-500/10 pb-4">Hey, enter your details to
                continue.</p>

            <form id="loginForm" class="space-y-6">
                <!-- Error Display -->
                <div id="error-message"
                    class="hidden text-sm uppercase font-bold tracking-widest text-red-400 bg-red-900/20 border border-red-500/30 px-4 py-3 rounded-xl mb-4 text-center">
                </div>

                <div class="space-y-2 relative">
                    <label for="email"
                        class="block text-xs font-semibold text-slate-400 uppercase tracking-widest">Campus
                        Email</label>
                    <div class="relative">
                        <input type="email" id="email" required
                            class="cyber-input w-full px-4 py-3 pl-11 rounded-xl text-sm transition-all text-white placeholder:text-slate-500 font-mono"
                            placeholder="test@srmist.edu.in">
                    </div>
                </div>

                <div class="space-y-2 relative">
                    <div class="flex justify-between items-center">
                        <label for="password"
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-widest">Password</label>
                    </div>
                    <div class="relative">
                        <input type="password" id="password" required
                            class="cyber-input w-full px-4 py-3 pl-11 rounded-xl text-sm transition-all focus:border-cyan-400 focus:shadow-[0_0_15px_rgba(34,211,238,0.2)] text-white placeholder:text-slate-500 font-mono"
                            placeholder="••••••••">
                    </div>
                </div>

                <button type="submit" id="loginBtn"
                    class="btn-primary w-full py-3.5 rounded-xl font-medium tracking-wide flex justify-center items-center gap-2 shadow-[0_0_20px_rgba(99,102,241,0.3)] hover:shadow-[0_0_30px_rgba(99,102,241,0.5)] transition-all">
                    <span>Login to UniCollab.</span>
                    <svg class="w-5 h-5 ml-1 transition-transform group-hover:translate-x-1" fill="none"
                        stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                    </svg>
                </button>
            </form>

            <div class="mt-8 pt-6 border-t border-indigo-500/10 text-center">
                <p class="text-xs text-slate-500 flex items-center justify-center gap-1.5">
                    <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                    </svg>
                    Only SRMIST students can access UniCollab.
                </p>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('loginBtn');
            const errorDiv = document.getElementById('error-message');
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            errorDiv.classList.add('hidden');
            btn.innerHTML = '<span>Authenticating...</span>';
            btn.disabled = true;

            try {
                const res = await API.login(email, password);
                if (res.user && !res.user.profile_completed) {
                    window.location.href = 'profile.html';
                } else {
                    window.location.href = 'dashboard.html';
                }
            } catch (err) {
                errorDiv.textContent = err.message || "Invalid credentials.";
                errorDiv.classList.remove('hidden');
                btn.innerHTML = '<span>Login to UniCollab.</span>';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
