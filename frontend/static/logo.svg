<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
    <!-- Hexagon Tech Badge with interconnected nodes forming a U -->
    <!-- Glow definitions -->
    <defs>
        <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="3" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        <filter id="cyan-glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="2" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
    </defs>
    
    <!-- Outer Hexagon -->
    <polygon points="50,5 90,25 90,75 50,95 10,75 10,25" fill="none" stroke="#22D3EE" stroke-width="2" stroke-opacity="0.3" />
    
    <!-- Connections -->
    <path d="M 30 30 L 30 65 L 50 80 L 70 65 L 70 30" fill="none" stroke="#6366F1" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" filter="url(#neon-glow)" />
    
    <!-- Nodes -->
    <circle cx="30" cy="30" r="6" fill="#020617" stroke="#22D3EE" stroke-width="3" filter="url(#cyan-glow)" />
    <circle cx="70" cy="30" r="6" fill="#020617" stroke="#22D3EE" stroke-width="3" filter="url(#cyan-glow)" />
    <circle cx="30" cy="65" r="5" fill="#6366F1" filter="url(#neon-glow)" />
    <circle cx="70" cy="65" r="5" fill="#6366F1" filter="url(#neon-glow)" />
    <circle cx="50" cy="80" r="7" fill="#22D3EE" filter="url(#cyan-glow)" />
    
    <!-- Inner Connections -->
    <line x1="30" y1="30" x2="70" y2="30" stroke="#6366F1" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />
    <line x1="30" y1="65" x2="70" y2="65" stroke="#6366F1" stroke-width="1" stroke-dasharray="2,2" opacity="0.5" />
</svg>
