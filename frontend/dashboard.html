<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-[#020617] text-white min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-[#020617]/80 border-b border-white/5">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <!-- Brand -->
                    <a href="dashboard.html" class="flex items-center gap-2 group">
                        <img src="static/images/logo.svg" alt="logo"
                            class="w-6 h-6 group-hover:scale-110 transition-transform">
                        <span
                            class="font-bold text-lg tracking-tight text-white group-hover:text-indigo-400 transition-colors">UniCollab.</span>
                    </a>

                    <!-- App Navigation -->
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors bg-indigo-500/10 text-indigo-400 border border-indigo-500/20">Dashboard</a>
                        <a href="explore.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-400 hover:text-cyan-400 hover:bg-cyan-500/10">Discover</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <div
                        class="hidden sm:flex items-center gap-3 bg-white/5 px-3 py-1.5 rounded-full border border-white/10">
                        <div
                            class="w-6 h-6 rounded-full bg-indigo-500/20 border border-indigo-500/50 flex justify-center items-center text-indigo-400 font-bold text-[10px] uppercase shadow-[0_0_10px_rgba(99,102,241,0.2)]">
                            <span id="nav-user-initial">U</span>
                        </div>
                        <span id="nav-user-name" class="text-sm font-medium text-slate-300"></span>
                    </div>
                    <div class="h-4 w-px bg-white/10 hidden sm:block"></div>
                    <button onclick="API.logout()"
                        class="text-xs text-slate-500 hover:text-red-400 transition-colors uppercase tracking-widest font-bold">Log
                        Off</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 mt-6">

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-10 gap-4">
            <div>
                <h1 class="text-3xl font-bold text-white tracking-tight">Active Terminal</h1>
                <p class="text-sm text-slate-400">Initialize or join operations across the grid.</p>
            </div>
            <div class="relative">
                <button onclick="toggleDropdown()" id="createNewBtn"
                    class="btn-primary px-6 py-3 rounded-xl font-bold tracking-wide flex items-center gap-2 text-sm shadow-neon hover:shadow-[0_0_20px_rgba(99,102,241,0.4)] transition-all">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    + Create New
                </button>
                <div id="createNewDropdown"
                    class="hidden absolute right-0 mt-2 w-48 rounded-xl shadow-2xl bg-[#0f172a] border border-white/10 overflow-hidden z-50 transform opacity-0 scale-95 transition-all duration-200">
                    <button onclick="showInlineForm('project')"
                        class="w-full text-left px-4 py-3 text-sm text-slate-300 hover:bg-indigo-500/20 hover:text-indigo-400 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                            </path>
                        </svg>
                        Project
                    </button>
                    <button onclick="showInlineForm('hackathon')"
                        class="w-full text-left px-4 py-3 text-sm text-slate-300 hover:bg-cyan-500/20 hover:text-cyan-400 transition-colors flex items-center gap-2">
                        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                        Hackathon
                    </button>
                </div>
            </div>
        </div>

        <!-- Inline Forms Container -->
        <div id="inlineFormsContainer" class="hidden mb-10 overflow-hidden transition-all duration-500 ease-in-out">
            <!-- Project Form Card -->
            <div id="projectFormCard"
                class="hidden glass-panel p-6 sm:p-8 rounded-2xl border-l-4 border-l-indigo-500 relative">
                <button onclick="hideInlineForm()"
                    class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">&times;</button>
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-indigo-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z">
                        </path>
                    </svg>
                    Initialize New Project
                </h2>
                <form id="inlineProjectForm" class="space-y-5">
                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Operation
                            Title</label>
                        <input type="text" id="ip_title" required
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm"
                            placeholder="E.g., Neural Network UI">
                    </div>
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Description</label>
                        <textarea id="ip_desc" required
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm min-h-[80px]"
                            placeholder="Brief context..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Tech
                                Stack</label>
                            <div class="relative">
                                <input type="text" id="ip_techInput"
                                    class="cyber-input w-full px-4 py-3 rounded-lg text-sm font-mono placeholder:font-sans"
                                    placeholder="Type tech & press Enter"
                                    onkeydown="handleChipInput(event, 'ip_techInput', 'ip_techChipsContainer', 'ip_techChips')">
                                <div id="ip_techChipsContainer"
                                    class="flex flex-wrap gap-2 mt-3 min-h-[30px] p-2 bg-slate-900/30 rounded-lg border border-white/5">
                                    <span class="text-slate-600 text-[10px] italic py-1 px-2">No items added.</span>
                                </div>
                            </div>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Required
                                Skills</label>
                            <div class="relative">
                                <input type="text" id="ip_skillsInput"
                                    class="cyber-input w-full px-4 py-3 rounded-lg text-sm font-mono placeholder:font-sans"
                                    placeholder="Type skill & press Enter"
                                    onkeydown="handleChipInput(event, 'ip_skillsInput', 'ip_skillsChipsContainer', 'ip_skillsChips')">
                                <div id="ip_skillsChipsContainer"
                                    class="flex flex-wrap gap-2 mt-3 min-h-[30px] p-2 bg-slate-900/30 rounded-lg border border-white/5">
                                    <span class="text-slate-600 text-[10px] italic py-1 px-2">No items added.</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label
                                class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Duration</label>
                            <select id="ip_duration" required
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm appearance-none flex">
                                <option value="">Select duration...</option>
                                <option value="< 1 Month">&lt; 1 Month</option>
                                <option value="1-3 Months">1-3 Months</option>
                                <option value="3-6 Months">3-6 Months</option>
                                <option value="6+ Months">6+ Months</option>
                            </select>
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Team Size
                                Limit</label>
                            <input type="number" id="ip_size" required min="1" max="10"
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm" value="4">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/5 flex justify-end gap-3">
                        <button type="button" onclick="hideInlineForm()"
                            class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white transition-colors">Cancel</button>
                        <button type="submit" id="ip_submitBtn"
                            class="btn-primary px-8 py-2.5 rounded-lg text-sm font-bold tracking-wide shadow-neon">Broadcast
                            Project</button>
                    </div>
                </form>
            </div>

            <!-- Hackathon Form Card -->
            <div id="hackathonFormCard"
                class="hidden glass-panel p-6 sm:p-8 rounded-2xl border-l-4 border-l-cyan-500 relative">
                <button onclick="hideInlineForm()"
                    class="absolute top-4 right-4 text-slate-500 hover:text-white transition-colors">&times;</button>
                <h2 class="text-xl font-bold text-white mb-6 flex items-center gap-2">
                    <svg class="w-5 h-5 text-cyan-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                            d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                    </svg>
                    Organize Hackathon
                </h2>
                <form id="inlineHackathonForm" class="space-y-5">
                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Hackathon
                            Name</label>
                        <input type="text" id="ih_name" required class="cyber-input w-full px-4 py-3 rounded-lg text-sm"
                            placeholder="E.g., Web3 Innovators Hack">
                    </div>
                    <div class="space-y-2">
                        <label
                            class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Description</label>
                        <textarea id="ih_desc" required
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm min-h-[80px]"
                            placeholder="Event goals, prizes, details..."></textarea>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label
                                class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Theme</label>
                            <input type="text" id="ih_theme" required
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm"
                                placeholder="E.g., Decentralized Finance">
                        </div>
                        <div class="space-y-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Tech Stack
                                (Optional)</label>
                            <div class="relative">
                                <input type="text" id="ih_techInput"
                                    class="cyber-input w-full px-4 py-3 rounded-lg text-sm font-mono placeholder:font-sans"
                                    placeholder="Type tech & press Enter"
                                    onkeydown="handleChipInput(event, 'ih_techInput', 'ih_techChipsContainer', 'ih_techChips')">
                                <div id="ih_techChipsContainer"
                                    class="flex flex-wrap gap-2 mt-3 min-h-[30px] p-2 bg-slate-900/30 rounded-lg border border-white/5">
                                    <span class="text-slate-600 text-[10px] italic py-1 px-2">No items added.</span>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="grid grid-cols-1 md:grid-cols-2 gap-5">
                        <div class="space-y-2">
                            <label class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Team Size
                                (Max)</label>
                            <input type="number" id="ih_size" required min="1" max="10"
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm" value="4">
                        </div>
                        <div class="space-y-2">
                            <label
                                class="block text-xs font-medium text-slate-400 uppercase tracking-widest">Registration
                                Deadline</label>
                            <input type="date" id="ih_deadline" required
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm text-slate-300 pattern-date flex">
                        </div>
                    </div>

                    <div class="pt-4 border-t border-white/5 flex justify-end gap-3">
                        <button type="button" onclick="hideInlineForm()"
                            class="px-6 py-2.5 rounded-lg text-sm font-medium text-slate-400 hover:text-white transition-colors">Cancel</button>
                        <button type="submit" id="ih_submitBtn"
                            class="bg-cyan-500 hover:bg-cyan-400 text-slate-900 px-8 py-2.5 rounded-lg text-sm font-bold tracking-wide shadow-[0_0_15px_rgba(34,211,238,0.4)] hover:shadow-[0_0_25px_rgba(34,211,238,0.6)] transition-all">Launch
                            Hackathon</button>
                    </div>
                </form>
            </div>
        </div>

        <div id="loading" class="text-center py-10 text-slate-500 font-mono animate-pulse">Loading operations...</div>
        <div id="project-list" class="space-y-4 hidden">
            <!-- Populated by JS -->
        </div>

        <div id="no-projects" class="hidden text-center py-20 bg-white/5 rounded-2xl border border-white/10">
            <p class="text-slate-400 font-medium">No active operations found. Initialize one to start.</p>
        </div>
    </div>

    <!-- Deleted Create Project Modal Code -->

    <script src="js/api.js"></script>
    <script>
        enforceAuth();
        const user = API.getUser();
        if (user && user.name) {
            document.getElementById('nav-user-name').innerText = user.name;
            document.getElementById('nav-user-initial').innerText = user.name.charAt(0).toUpperCase();
        }

        async function loadProjects() {
            try {
                const projects = await API.getProjects();
                const list = document.getElementById('project-list');
                const loading = document.getElementById('loading');
                const noProjects = document.getElementById('no-projects');

                loading.classList.add('hidden');

                if (!projects || projects.length === 0) {
                    noProjects.classList.remove('hidden');
                    return;
                }

                list.innerHTML = '';
                projects.forEach(p => {
                    const skillsHtml = p.skills_needed.map(skill =>
                        `<span class="px-2 py-0.5 rounded text-[10px] bg-slate-800 border border-slate-700 text-slate-400 font-mono">${skill}</span>`
                    ).join('');

                    const el = `
                        <div class="glass-panel p-6 rounded-xl border-l-4 border-l-indigo-500 hover:bg-white/5 transition-all flex flex-col md:flex-row justify-between gap-6 group">
                            <div class="flex-1">
                                <h3 class="text-xl font-bold text-white group-hover:text-indigo-400 transition-colors mb-2">${p.title}</h3>
                                <p class="text-sm text-slate-400 mb-4 line-clamp-2">${p.description}</p>
                                <div class="flex flex-wrap items-center gap-2">
                                    <span class="text-[10px] uppercase font-bold text-slate-500 tracking-widest mr-2">Project Tech Stack:</span>
                                    ${skillsHtml}
                                </div>
                            </div>
                            <div class="flex flex-col items-end justify-between min-w-[150px] shrink-0">
                                <div class="text-right mb-4">
                                    <p class="text-xs text-slate-500 font-mono">Commander</p>
                                    <p class="text-sm font-bold text-slate-300 tracking-wide">${p.creator_name}</p>
                                    <p class="text-xs text-slate-600 font-mono mt-1">Slots: ${p.team_size}</p>
                                </div>
                                <button onclick="alert('Join request sent to ${p.creator_name}')" class="btn-primary w-full py-2.5 rounded-lg text-xs font-bold uppercase tracking-widest shadow-neon text-center">
                                    Join Operation
                                </button>
                            </div>
                        </div>
                    `;
                    list.innerHTML += el;
                });
                list.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "System Failure: Could not load data.";
            }
        }

        // State for Multi-Select Chips
        window.ip_techChips = [];
        window.ip_skillsChips = [];
        window.ih_techChips = [];

        function toggleDropdown() {
            const dropdown = document.getElementById('createNewDropdown');
            if (dropdown.classList.contains('hidden')) {
                dropdown.classList.remove('hidden');
                setTimeout(() => {
                    dropdown.classList.remove('opacity-0', 'scale-95');
                    dropdown.classList.add('opacity-100', 'scale-100');
                }, 10);
            } else {
                dropdown.classList.remove('opacity-100', 'scale-100');
                dropdown.classList.add('opacity-0', 'scale-95');
                setTimeout(() => dropdown.classList.add('hidden'), 200);
            }
        }

        document.addEventListener('click', (e) => {
            const btn = document.getElementById('createNewBtn');
            const dropdown = document.getElementById('createNewDropdown');
            if (btn && dropdown && !btn.contains(e.target) && !dropdown.contains(e.target)) {
                if (!dropdown.classList.contains('hidden')) toggleDropdown();
            }
        });

        function showInlineForm(type) {
            const dropdown = document.getElementById('createNewDropdown');
            dropdown.classList.remove('opacity-100', 'scale-100');
            dropdown.classList.add('opacity-0', 'scale-95');
            setTimeout(() => dropdown.classList.add('hidden'), 200);

            const container = document.getElementById('inlineFormsContainer');
            const projectCard = document.getElementById('projectFormCard');
            const hackathonCard = document.getElementById('hackathonFormCard');

            container.classList.remove('hidden');

            if (type === 'project') {
                projectCard.classList.remove('hidden');
                hackathonCard.classList.add('hidden');
            } else if (type === 'hackathon') {
                hackathonCard.classList.remove('hidden');
                projectCard.classList.add('hidden');
            }
        }

        function hideInlineForm() {
            document.getElementById('inlineFormsContainer').classList.add('hidden');
            document.getElementById('projectFormCard').classList.add('hidden');
            document.getElementById('hackathonFormCard').classList.add('hidden');
        }

        function handleChipInput(e, inputId, containerId, arrayName) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const input = document.getElementById(inputId);
                const val = input.value.trim();
                const targetArray = window[arrayName];
                if (val && !targetArray.includes(val)) {
                    targetArray.push(val);
                    renderChips(containerId, arrayName);
                }
                input.value = '';
            }
        }

        function removeChip(val, containerId, arrayName) {
            const targetArray = window[arrayName];
            const index = targetArray.indexOf(val);
            if (index > -1) {
                targetArray.splice(index, 1);
                renderChips(containerId, arrayName);
            }
        }

        function renderChips(containerId, arrayName) {
            const targetArray = window[arrayName];
            const container = document.getElementById(containerId);
            container.innerHTML = '';

            if (targetArray.length === 0) {
                container.innerHTML = `<span class="text-slate-600 text-[10px] italic py-1 px-2">No items added.</span>`;
                return;
            }

            targetArray.forEach(val => {
                const colorStr = (containerId.includes('project') || containerId.includes('skills')) ? 'indigo' : 'cyan';
                const div = document.createElement('div');
                div.className = `px-2 py-1 bg-${colorStr}-500/10 border border-${colorStr}-500/20 rounded-md text-[10px] font-mono text-${colorStr}-300 flex items-center gap-1.5`;
                // Escape string properly
                const safeVal = val.replace(/'/g, "\\'");
                div.innerHTML = `
                    <span>${val}</span>
                    <button type="button" class="hover:text-white focus:outline-none" onclick="removeChip('${safeVal}', '${containerId}', '${arrayName}')">&times;</button>
                `;
                container.appendChild(div);
            });
        }

        document.getElementById('inlineProjectForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('ip_submitBtn');
            btn.innerHTML = 'Broadcasting...';
            btn.disabled = true;

            const title = document.getElementById('ip_title').value;
            const desc = document.getElementById('ip_desc').value;
            const reqSkills = window.ip_skillsChips.length > 0 ? window.ip_skillsChips : ["General"];
            const techStack = window.ip_techChips.length > 0 ? `\n\nTech Stack: ${window.ip_techChips.join(', ')}` : '';
            const dur = document.getElementById('ip_duration').value;
            const durationTxt = dur ? `\nDuration: ${dur}` : '';

            const detailedDesc = desc + techStack + durationTxt;
            const size = parseInt(document.getElementById('ip_size').value, 10);

            const data = { title: title, description: detailedDesc, skills_needed: reqSkills, team_size: size };

            try {
                await API.createProject(data);
                hideInlineForm();
                document.getElementById('inlineProjectForm').reset();
                window.ip_skillsChips = [];
                window.ip_techChips = [];
                renderChips('ip_techChipsContainer', 'ip_techChips');
                renderChips('ip_skillsChipsContainer', 'ip_skillsChips');

                btn.innerHTML = 'Broadcast Project';
                btn.disabled = false;

                document.getElementById('project-list').classList.add('hidden');
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('no-projects').classList.add('hidden');
                loadProjects();
            } catch (err) {
                alert("Creation failed: " + err.message);
                btn.innerHTML = 'Broadcast Project';
                btn.disabled = false;
            }
        });

        document.getElementById('inlineHackathonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('ih_submitBtn');
            btn.innerHTML = 'Launching...';
            btn.disabled = true;

            const title = document.getElementById('ih_name').value + " (Hackathon)";
            const desc = document.getElementById('ih_desc').value;
            const theme = document.getElementById('ih_theme').value;
            const techStack = window.ih_techChips.length > 0 ? `\n\nTech Stack: ${window.ih_techChips.join(', ')}` : '';
            const deadline = document.getElementById('ih_deadline').value;
            const deadlineTxt = deadline ? `\nDeadline: ${deadline}` : '';

            const detailedDesc = `Theme: ${theme}\n` + desc + techStack + deadlineTxt;
            const size = parseInt(document.getElementById('ih_size').value, 10);

            const data = { title: title, description: detailedDesc, skills_needed: window.ih_techChips.length > 0 ? window.ih_techChips : ["General"], team_size: size };

            try {
                await API.createProject(data);
                hideInlineForm();
                document.getElementById('inlineHackathonForm').reset();
                window.ih_techChips = [];
                renderChips('ih_techChipsContainer', 'ih_techChips');

                btn.innerHTML = 'Launch Hackathon';
                btn.disabled = false;

                document.getElementById('project-list').classList.add('hidden');
                document.getElementById('loading').classList.remove('hidden');
                document.getElementById('no-projects').classList.add('hidden');
                loadProjects();
            } catch (err) {
                alert("Launch failed: " + err.message);
                btn.innerHTML = 'Launch Hackathon';
                btn.disabled = false;
            }
        });

        loadProjects();
    </script>
</body>

</html>
