<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills & Interests | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body
    class="bg-[#020617] text-white min-h-screen relative overflow-x-hidden flex flex-col items-center justify-center p-4">

    <!-- Glowing Orbs -->
    <div
        class="fixed top-0 right-0 w-full h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-cyan-900/20 via-[#020617]/0 to-transparent pointer-events-none z-0">
    </div>

    <div class="w-full max-w-3xl relative z-10">
        <!-- Onboarding Step Indicator -->
        <div class="flex items-center justify-center mb-10">
            <div class="flex flex-col items-center">
                <div
                    class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"></path>
                    </svg>
                </div>
                <span class="text-xs font-medium text-slate-500 mt-2 uppercase tracking-wide">Profile</span>
            </div>
            <div class="w-24 h-[2px] bg-indigo-500/50 -mt-6 mx-2"></div>
            <div class="flex flex-col items-center">
                <div
                    class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    2</div>
                <span class="text-xs font-medium text-indigo-400 mt-2 uppercase tracking-wide">Skills & Interests</span>
            </div>
        </div>

        <div class="glass-panel p-8 sm:p-10 rounded-2xl shadow-2xl relative overflow-hidden">
            <h2 class="text-2xl font-bold text-white mb-2">Technical Skills</h2>
            <p class="text-sm text-slate-400 mb-8 border-b border-white/5 pb-4">Define your programming languages
                and
                core capabilities.</p>

            <div class="space-y-6">
                <!-- Active Skill Tags Area -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-3">Active
                        Skills</label>
                    <div class="min-h-[80px] p-4 bg-slate-900/50 border border-slate-700/50 rounded-xl flex flex-wrap gap-2 items-start shadow-inner"
                        id="selectedSkillsArea">
                        <span class="text-slate-500 text-sm italic py-1" id="emptyText">No capabilities
                            programmed...</span>
                    </div>
                </div>

                <!-- Input area -->
                <div>
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-2">Input
                        Console</label>
                    <div class="flex gap-3">
                        <input type="text" id="customSkillInput" placeholder="Type a skill and hit Enter..."
                            autocomplete="off"
                            class="cyber-input flex-1 px-4 py-3 rounded-xl text-sm font-mono placeholder:font-sans">
                        <button type="button" class="btn-secondary px-6 py-3 rounded-xl font-medium tracking-wide"
                            id="addCustomSkillBtn">Add</button>
                    </div>
                </div>

                <!-- Suggestions area -->
                <div class="pt-4 border-t border-white/5">
                    <label
                        class="block text-xs font-medium text-slate-400 uppercase tracking-wider mb-3 flex items-center gap-2">
                        System Suggestions
                    </label>
                    <div class="flex flex-wrap gap-2" id="suggestionsContainer">
                        <!-- Populated by JS -->
                    </div>
                </div>

                <div
                    class="mt-8 pt-6 border-t border-white/5 flex flex-col sm:flex-row justify-between items-center gap-4">
                    <a href="dashboard.html"
                        class="text-sm text-slate-500 hover:text-slate-300 transition-colors uppercase tracking-wider font-medium">Skip
                        Phase</a>
                    <button type="button" id="submitSkillsBtn"
                        class="btn-primary w-full sm:w-auto px-8 py-3.5 rounded-xl font-medium tracking-wide flex justify-center items-center gap-2 shadow-neon group">
                        <span>Initialize Dashboard</span>
                        <svg class="w-5 h-5 group-hover:translate-x-1 transition-transform" fill="none"
                            stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M14 5l7 7m0 0l-7 7m7-7H3"></path>
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();

        const presetSkills = ["Python", "Machine Learning", "UI/UX", "Web Development", "Data Science", "AI", "Blockchain", "Cybersecurity", "React", "FastAPI"];
        let currentSkills = [];

        const inputField = document.getElementById('customSkillInput');
        const selectedArea = document.getElementById('selectedSkillsArea');
        const emptyText = document.getElementById('emptyText');
        const submitBtn = document.getElementById('submitSkillsBtn');

        // Populate suggestions
        const suggestionContainer = document.getElementById('suggestionsContainer');
        presetSkills.forEach(skill => {
            const btn = document.createElement('button');
            btn.className = 'px-3 py-1.5 bg-white/5 hover:bg-white/10 border border-white/10 hover:border-cyan-500/30 rounded-lg text-xs font-medium text-slate-300 hover:text-cyan-400 transition-all cursor-pointer';
            btn.innerText = skill;
            btn.onclick = () => addSkill(skill);
            suggestionContainer.appendChild(btn);
        });

        function renderSkills() {
            selectedArea.innerHTML = '';
            if (currentSkills.length === 0) {
                const span = document.createElement('span');
                span.className = 'text-slate-500 text-sm italic py-1';
                span.innerText = 'No capabilities programmed...';
                selectedArea.appendChild(span);
            } else {
                currentSkills.forEach(skill => {
                    const tag = document.createElement('div');
                    tag.className = 'px-3 py-1.5 bg-cyan-500/10 border border-cyan-500/20 rounded-md text-xs font-medium text-cyan-300 flex items-center gap-2 shadow-[0_0_10px_rgba(34,211,238,0.05)]';
                    tag.innerHTML = `
                        <span class="tracking-wide">${skill}</span>
                        <button type="button" class="w-4 h-4 rounded-full hover:bg-cyan-500/20 flex items-center justify-center text-cyan-400 hover:text-cyan-200 transition-colors" onclick="removeSkill('${skill}')">
                            &times;
                        </button>
                    `;
                    selectedArea.appendChild(tag);
                });
            }
        }

        window.addSkill = function (skillName) {
            const trimmed = skillName.trim();
            if (trimmed && !currentSkills.includes(trimmed)) {
                currentSkills.push(trimmed);
                renderSkills();
            }
            inputField.value = '';
            inputField.focus();
        };

        window.removeSkill = function (skillName) {
            currentSkills = currentSkills.filter(s => s !== skillName);
            renderSkills();
        };

        document.getElementById('addCustomSkillBtn').onclick = () => addSkill(inputField.value);
        inputField.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addSkill(inputField.value);
            }
        });

        submitBtn.onclick = async () => {
            submitBtn.innerHTML = '<span>Processing...</span>';
            submitBtn.disabled = true;
            try {
                await API.saveSkills(currentSkills);
                window.location.href = 'dashboard.html';
            } catch (err) {
                alert("Failed to save skills: " + err.message);
                submitBtn.innerHTML = '<span>Initialize Dashboard</span>';
                submitBtn.disabled = false;
            }
        };
    </script>
</body>

</html>
