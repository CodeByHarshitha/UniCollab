<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Projects | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-gradient-to-br from-lime-50 to-emerald-50 text-slate-800 min-h-screen relative overflow-x-hidden">

    <!-- Unified Navbar -->
    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <!-- Brand (Text Only, Bold, Larger, Modern Minimal) -->
                    <a href="dashboard.html" class="flex items-center group">
                        <span
                            class="font-bold text-2xl tracking-tighter text-slate-800 group-hover:text-teal-500 transition-colors">UniCollab.</span>
                    </a>

                    <!-- App Navigation -->
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Dashboard</a>
                        <a href="explore.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Discover</a>
                        <a href="my_projects.html"
                            class="px-3 py-2 rounded-lg text-sm font-bold bg-teal-50 text-teal-600 border border-teal-100">My
                            Projects</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <!-- Profile Icon (Routes to Profile Page) -->
                    <a href="profile.html"
                        class="flex items-center justify-center w-9 h-9 rounded-full bg-slate-100 hover:bg-teal-100 text-slate-600 hover:text-teal-600 transition-colors border border-slate-200 shadow-sm group">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </a>

                    <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>

                    <!-- Log Out Button -->
                    <button onclick="API.logout()"
                        class="text-xs text-slate-500 hover:text-red-500 transition-colors uppercase tracking-widest font-bold">
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-7xl mx-auto p-4 md:p-8 mt-6">
        <div class="mb-10 pt-4 flex justify-between items-end">
            <div>
                <h1 class="text-4xl font-bold text-slate-800 tracking-tight mb-2">My Projects</h1>
                <p class="text-slate-500 text-lg">Manage the projects you have created and review join requests.</p>
            </div>

            <a href="create_project.html"
                class="btn-primary px-6 py-3 rounded-xl font-bold tracking-wide flex justify-center items-center gap-2 shadow-lg hover:shadow-teal-500/30 transition-shadow">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                </svg>
                <span>New Project</span>
            </a>
        </div>

        <div id="loading" class="flex justify-center items-center py-20 hidden">
            <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-teal-500"></div>
        </div>

        <div id="noData" class="text-center py-20 glass-panel rounded-2xl bg-white/50 border border-slate-200 hidden">
            <div class="w-20 h-20 mx-auto bg-slate-100 rounded-full flex items-center justify-center mb-4">
                <svg class="w-10 h-10 text-slate-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"
                        d="M19 11H5m14 0a2 2 0 012 2v6a2 2 0 01-2 2H5a2 2 0 01-2-2v-6a2 2 0 012-2m14 0V9a2 2 0 00-2-2M5 11V9a2 2 0 012-2m0 0V5a2 2 0 012-2h6a2 2 0 012 2v2M7 7h10">
                    </path>
                </svg>
            </div>
            <h3 class="text-lg font-bold text-slate-700 mb-2">You haven't created any projects yet</h3>
            <p class="text-slate-500 mb-6">Start your first project to collaborate with others!</p>
            <a href="create_project.html" class="btn-primary px-6 py-2 rounded-lg font-bold inline-block">Start a
                Project</a>
        </div>

        <div id="projectsGrid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Project Cards Dyamically Inserted Here -->
        </div>

    </div>

    <!-- Script Template -->
    <template id="projectCardTemplate">
        <div
            class="glass-panel rounded-2xl p-6 bg-white/70 border border-slate-200 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden group flex flex-col h-full">

            <!-- Glow Effect -->
            <div
                class="absolute -inset-1 rounded-3xl bg-gradient-to-br from-teal-400/20 to-blue-400/20 opacity-0 group-hover:opacity-100 blur-xl transition-opacity duration-500 -z-10">
            </div>

            <div class="flex justify-between items-start mb-4">
                <h3 class="text-xl font-bold text-slate-800 line-clamp-1 flex-1 pr-4" data-ref="title">Project Title
                </h3>

                <!-- Status Badge -->
                <span
                    class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-semibold whitespace-nowrap"
                    data-ref="statusBadge">
                    Status
                </span>
            </div>

            <p class="text-sm text-slate-600 mb-5 line-clamp-3 min-h-[60px]" data-ref="description">
                Project description goes here.
            </p>

            <div class="mb-5 flex-1">
                <h4 class="text-xs font-bold text-slate-500 uppercase tracking-wider mb-2">Required Skills</h4>
                <div class="flex flex-wrap gap-1.5" data-ref="skillsContainer">
                    <!-- Skills Chips -->
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 pt-4 border-t border-slate-100 mb-5">
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Team Members</span>
                    <div class="flex items-baseline gap-1">
                        <span class="text-lg font-bold text-slate-700" data-ref="memberCount">1</span>
                        <span class="text-xs font-medium text-slate-500" data-ref="teamSize">/ 4</span>
                    </div>
                </div>
                <div class="flex flex-col">
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-wider mb-1">Join
                        Requests</span>
                    <div class="flex items-center gap-2">
                        <span class="text-lg font-bold text-slate-700" data-ref="requestsCount">0</span>

                        <!-- Notification Ping -->
                        <span class="flex h-2.5 w-2.5 relative hidden" data-ref="requestPing">
                            <span
                                class="animate-ping absolute inline-flex h-full w-full rounded-full bg-teal-400 opacity-75"></span>
                            <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-teal-500"></span>
                        </span>
                    </div>
                </div>
            </div>

            <button class="w-full btn-secondary py-2.5 rounded-lg text-sm font-bold tracking-wide text-center"
                data-ref="viewBtn">
                View Project Status
            </button>
        </div>
    </template>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();

        async function loadMyProjects() {
            const grid = document.getElementById('projectsGrid');
            const noData = document.getElementById('noData');
            const loading = document.getElementById('loading');

            grid.innerHTML = '';
            noData.classList.add('hidden');
            loading.classList.remove('hidden');

            try {
                const projects = await API.getMyProjects();
                loading.classList.add('hidden');

                if (!projects || projects.length === 0) {
                    noData.classList.remove('hidden');
                    return;
                }

                const template = document.getElementById('projectCardTemplate');

                projects.forEach(project => {
                    const clone = template.content.cloneNode(true);

                    clone.querySelector('[data-ref="title"]').textContent = project.title;
                    clone.querySelector('[data-ref="description"]').textContent = project.description;
                    clone.querySelector('[data-ref="memberCount"]').textContent = project.current_members;
                    clone.querySelector('[data-ref="teamSize"]').textContent = `/ ${project.team_size}`;
                    clone.querySelector('[data-ref="requestsCount"]').textContent = project.pending_requests_count;

                    // Status Badge Styling
                    const badge = clone.querySelector('[data-ref="statusBadge"]');
                    badge.textContent = project.status;
                    if (project.status === "Open") {
                        badge.classList.add('bg-blue-100', 'text-blue-700');
                    } else if (project.status === "Team Full") {
                        badge.classList.add('bg-orange-100', 'text-orange-700');
                    } else if (project.status === "In Progress") {
                        badge.classList.add('bg-green-100', 'text-green-700');
                    } else {
                        badge.classList.add('bg-slate-100', 'text-slate-700');
                    }

                    // Notification Ping
                    if (project.pending_requests_count > 0) {
                        clone.querySelector('[data-ref="requestPing"]').classList.remove('hidden');
                    }

                    // Skills
                    const skillsContainer = clone.querySelector('[data-ref="skillsContainer"]');
                    const skills = project.required_skills || [];
                    if (skills.length > 0) {
                        skills.slice(0, 3).forEach(skill => {
                            const span = document.createElement('span');
                            span.className = 'px-2 py-0.5 bg-slate-100 text-slate-600 rounded text-[10px] font-semibold font-mono border border-slate-200';
                            span.textContent = skill;
                            skillsContainer.appendChild(span);
                        });
                        if (skills.length > 3) {
                            const span = document.createElement('span');
                            span.className = 'px-2 py-0.5 bg-slate-50 text-slate-400 rounded text-[10px] font-medium';
                            span.textContent = `+${skills.length - 3} more`;
                            skillsContainer.appendChild(span);
                        }
                    } else {
                        skillsContainer.innerHTML = '<span class="text-xs text-slate-400 italic">No specific skills required</span>';
                    }

                    // Button action
                    const btn = clone.querySelector('[data-ref="viewBtn"]');
                    btn.onclick = () => {
                        window.location.href = `project_status.html?id=${project.id}`;
                    };

                    grid.appendChild(clone);
                });

            } catch (err) {
                loading.classList.add('hidden');
                console.error("Failed to load projects:", err);
                const p = document.createElement('p');
                p.className = 'text-center text-red-500 font-bold col-span-full';
                p.textContent = 'Error loading your projects. Please try again.';
                grid.appendChild(p);
            }
        }

        loadMyProjects();
    </script>
</body>

</html>
