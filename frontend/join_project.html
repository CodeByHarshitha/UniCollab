<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join a Project | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-gradient-to-br from-lime-50 to-emerald-50 text-slate-800 min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <!-- Brand -->
                    <a href="dashboard.html" class="flex items-center gap-2 group">
                        <img src="static/images/logo.svg" alt="logo"
                            class="w-6 h-6 group-hover:scale-110 transition-transform hidden">
                        <span
                            class="font-bold text-lg tracking-tight text-slate-800 group-hover:text-blue-600 transition-colors">UniCollab.</span>
                    </a>

                    <!-- App Navigation -->
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-500 hover:text-blue-600 hover:bg-blue-50/50">Dashboard</a>
                        <a href="explore.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-500 hover:text-teal-600 hover:bg-teal-50/50">Discover</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <div
                        class="hidden sm:flex items-center gap-3 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                        <div
                            class="w-6 h-6 rounded-full bg-blue-100 border border-blue-200 flex justify-center items-center text-blue-600 font-bold text-[10px] uppercase">
                            <span id="nav-user-initial">U</span>
                        </div>
                        <span id="nav-user-name" class="text-sm font-bold text-slate-700"></span>
                    </div>
                    <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>
                    <button onclick="API.logout()"
                        class="text-xs text-slate-500 hover:text-red-500 transition-colors uppercase tracking-widest font-bold">Log
                        Off</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 mt-6">

        <div class="mb-8">
            <a href="dashboard.html"
                class="text-xs font-bold text-slate-500 hover:text-blue-600 uppercase tracking-widest flex items-center gap-1 mb-4 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Dashboard
            </a>

            <div class="flex flex-col md:flex-row md:items-center justify-between gap-4">
                <div>
                    <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Join a Project</h1>
                    <p class="text-slate-500 mt-2">Browse active projects on the network and collaborate with other
                        students.</p>
                </div>

                <a href="create_project.html"
                    class="btn-primary px-6 py-2.5 rounded-xl text-sm font-bold tracking-wide shadow-sm hover:shadow-md hover:-translate-y-0.5 transition-all flex items-center gap-2 w-full md:w-auto justify-center">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path>
                    </svg>
                    New Project
                </a>
            </div>
        </div>

        <!-- Filter Bar -->
        <div
            class="bg-white/70 backdrop-blur-md p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col md:flex-row gap-4 items-center justify-between mb-8">
            <div class="flex-1 w-full relative">
                <svg class="w-5 h-5 text-slate-400 absolute left-3 top-3 lg:top-2.5" fill="none" stroke="currentColor"
                    viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path>
                </svg>
                <input type="text" placeholder="Search operations by keyword or tech stack..."
                    class="w-full pl-10 pr-4 py-2.5 lg:py-2 rounded-lg border border-slate-200 text-sm focus:outline-none focus:border-blue-400 focus:ring-2 focus:ring-blue-100 transition-all font-mono placeholder:font-sans">
            </div>
            <div class="flex items-center gap-3 w-full md:w-auto">
                <select
                    class="w-full md:w-auto bg-slate-50 border border-slate-200 text-slate-600 text-sm rounded-lg px-4 py-2.5 lg:py-2 focus:outline-none focus:border-blue-400 transition-all font-medium appearance-none">
                    <option value="">Filter by Size</option>
                    <option value="small">Small (< 3)</option>
                    <option value="medium">Medium (3-5)</option>
                    <option value="large">Large (5+)</option>
                </select>
            </div>
        </div>

        <div id="loading" class="text-center py-20 text-slate-500 font-mono animate-pulse">Scanning the network for
            active operations...</div>

        <div id="project-list" class="space-y-4 hidden z-10 relative">
            <!-- Populated by JS -->
        </div>

        <div id="no-projects" class="hidden text-center py-20 bg-white/50 rounded-2xl border border-slate-200">
            <p class="text-slate-500 font-medium text-lg">No active operations found.</p>
            <p class="text-slate-400 text-sm mt-2">Initialize one to start building your own team.</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();
        const user = API.getUser();
        if (user && user.name) {
            document.getElementById('nav-user-name').innerText = user.name;
            document.getElementById('nav-user-initial').innerText = user.name.charAt(0).toUpperCase();
        }

        async function loadProjects() {
            try {
                // Fetch projects from the API
                const projects = await API.getProjects();
                const list = document.getElementById('project-list');
                const loading = document.getElementById('loading');
                const noProjects = document.getElementById('no-projects');

                loading.classList.add('hidden');

                if (!projects || projects.length === 0) {
                    noProjects.classList.remove('hidden');
                    return;
                }

                list.innerHTML = '';
                projects.forEach(p => {
                    // Prepare skills chips html
                    const skillsHtml = p.skills_needed && p.skills_needed.length ? p.skills_needed.map(skill =>
                        `<span class="px-2.5 py-1 rounded bg-slate-100 border border-slate-200 text-slate-600 font-mono transition-colors hover:border-blue-300 hover:bg-blue-50 text-xs">${skill}</span>`
                    ).join('') : '<span class="text-slate-400 text-xs italic">No skills specified</span>';

                    const el = `
                        <div class="glass-panel p-6 sm:p-8 rounded-2xl border-l-4 border-l-blue-500 bg-white/70 border border-slate-200 hover:bg-white hover:shadow-lg hover:-translate-y-1 transition-all duration-300 flex flex-col md:flex-row justify-between gap-6 overflow-hidden relative group">
                            
                            <div class="absolute -right-10 -top-10 w-32 h-32 bg-blue-500/0 rounded-full blur-2xl group-hover:bg-blue-500/5 transition-all pointer-events-none"></div>

                            <div class="flex-1 relative z-10">
                                <h3 class="text-2xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors mb-2">${p.title}</h3>
                                <p class="text-slate-500 text-sm mb-6 leading-relaxed max-w-3xl">${p.description}</p>
                                
                                <div class="flex flex-col sm:flex-row sm:items-center gap-3 sm:gap-4">
                                    <span class="text-[10px] uppercase font-bold text-slate-500 tracking-widest bg-slate-100 px-2 py-1 rounded border border-slate-200 w-max">Required Stack</span>
                                    <div class="flex flex-wrap items-center gap-2">
                                        ${skillsHtml}
                                    </div>
                                </div>
                            </div>

                            <div class="flex flex-col items-start md:items-end justify-between min-w-[180px] shrink-0 pt-4 md:pt-0 border-t md:border-none border-slate-200 relative z-10">
                                <div class="text-left md:text-right mb-6 md:mb-4 flex flex-row md:flex-col justify-between items-center md:items-end w-full">
                                    <div class="flex items-center gap-3 md:justify-end">
                                        <div class="w-8 h-8 rounded-full bg-blue-100 border border-blue-200 flex justify-center items-center text-blue-600 font-bold text-[10px] uppercase shadow-sm">
                                            ${p.creator_name.charAt(0).toUpperCase()}
                                        </div>
                                        <div class="text-left md:text-right">
                                            <p class="text-[10px] text-slate-400 uppercase tracking-widest font-bold">Commander</p>
                                            <p class="text-sm font-bold text-slate-700">${p.creator_name}</p>
                                        </div>
                                    </div>
                                    <div class="md:mt-3 px-3 py-1 bg-slate-50 border border-slate-200 rounded-lg text-xs text-slate-600 font-mono shadow-sm">
                                        Team Slots: <span class="font-bold text-blue-600">${p.team_size}</span>
                                    </div>
                                </div>
                                <button onclick="alert('Join request sent to ${p.creator_name}')" class="btn-primary w-full py-3 rounded-lg text-sm font-bold tracking-wide shadow-sm hover:shadow-md transition-all">
                                    Request to Join
                                </button>
                            </div>
                        </div>
                    `;
                    list.innerHTML += el;
                });
                list.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "System Failure: Could not load active operations.";
                document.getElementById('loading').classList.add('text-red-500');
            }
        }

        // Initialize Feed
        loadProjects();

    </script>
</body>

</html>
