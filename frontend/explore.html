<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Discover | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-gradient-to-br from-lime-50 to-emerald-50 text-slate-800 min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <!-- Brand (Text Only, Bold, Larger, Modern Minimal) -->
                    <a href="dashboard.html" class="flex items-center group">
                        <span class="font-bold text-2xl tracking-tighter text-slate-800 group-hover:text-teal-500 transition-colors">UniCollab.</span>
                    </a>

                    <!-- App Navigation -->
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Dashboard</a>
                        <a href="explore.html" class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Discover</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <!-- Profile Icon (Routes to Profile Page) -->
                    <a href="profile.html" class="flex items-center justify-center w-9 h-9 rounded-full bg-slate-100 hover:bg-teal-100 text-slate-600 hover:text-teal-600 transition-colors border border-slate-200 shadow-sm group">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </a>
                    
                    <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>
                    
                    <!-- Log Out Button -->
                    <button onclick="API.logout()" class="text-xs text-slate-500 hover:text-red-500 transition-colors uppercase tracking-widest font-bold">
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto p-4 md:p-8 mt-6">
        <div class="mb-10 text-center">
            <h1 class="text-4xl font-bold text-slate-800 tracking-tight mb-3">Discover Collaborators</h1>
            <p class="text-slate-500">Match with peers based on overlapping tech stacks and objectives.</p>
        </div>

        <div id="loading" class="text-center py-20 text-slate-500 font-mono animate-pulse">Scanning the network...</div>

        <div id="collaborator-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 hidden">
            <!-- Populated by JS -->
        </div>

        <div id="no-results" class="hidden text-center py-20 bg-white/50 rounded-2xl border border-slate-200">
            <p class="text-slate-500 font-medium">No matching operatives found in the database.</p>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();
        const user = API.getUser();
        if (user && user.name) {
            document.getElementById('nav-user-name').innerText = user.name;
            document.getElementById('nav-user-initial').innerText = user.name.charAt(0).toUpperCase();
        }

        async function loadDiscover() {
            try {
                const results = await API.getDiscoverFeed();
                const grid = document.getElementById('collaborator-grid');
                const loading = document.getElementById('loading');
                const noResults = document.getElementById('no-results');

                loading.classList.add('hidden');

                if (!results || results.length === 0) {
                    noResults.classList.remove('hidden');
                    return;
                }

                grid.innerHTML = '';
                results.forEach(match => {
                    const user = match.user;
                    const score = match.score;
                    const skillsHtml = user.profile_data.skills.map(skill =>
                        `<span class="px-2 py-0.5 rounded text-[10px] bg-slate-100 border border-slate-200 text-slate-600 font-mono">${skill}</span>`
                    ).join('');

                    const card = `
                        <div class="glass-panel p-6 rounded-2xl border-t-4 border-t-teal-500 hover:-translate-y-1 transition-transform duration-300 shadow-lg group relative overflow-hidden bg-white/70">
                            <div class="absolute inset-0 bg-gradient-to-br from-teal-500/5 to-transparent opacity-0 group-hover:opacity-100 transition-opacity"></div>
                            
                            <div class="flex justify-between items-start mb-4 relative z-10">
                                <div>
                                    <h3 class="text-lg font-bold text-slate-800 group-hover:text-teal-600 transition-colors">${user.name}</h3>
                                    <p class="text-xs text-slate-500 font-mono uppercase tracking-wider">${user.profile_data.department}</p>
                                </div>
                                <div class="px-2 py-1 bg-teal-50 border border-teal-200 rounded-md text-xs font-bold text-teal-600">
                                    Score: ${score}
                                </div>
                            </div>

                            <div class="mb-6 relative z-10">
                                <p class="text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-2">Capabilities</p>
                                <div class="flex flex-wrap gap-1.5">
                                    ${skillsHtml}
                                </div>
                            </div>

                            <button onclick="alert('Invite sent to ${user.name} (Simulation)')" class="btn-secondary w-full py-2.5 rounded-xl text-xs font-bold uppercase tracking-widest group-hover:bg-teal-50 group-hover:text-teal-600 group-hover:border-teal-300 transition-all flex items-center justify-center gap-2 relative z-10">
                                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                                Invite to Collaborate
                            </button>
                        </div>
                    `;
                    grid.innerHTML += card;
                });
                grid.classList.remove('hidden');

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerText = "Failed to load network data.";
            }
        }

        loadDiscover();
    </script>
</body>

</html>
