<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Profile | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-gradient-to-br from-lime-50 to-emerald-50 text-slate-800 min-h-screen relative overflow-x-hidden">

    <!-- Unified Navbar -->
    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <a href="dashboard.html" class="flex items-center group">
                        <span
                            class="font-bold text-2xl tracking-tighter text-slate-800 group-hover:text-teal-500 transition-colors">UniCollab.</span>
                    </a>
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Dashboard</a>
                        <a href="explore.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-600 hover:text-teal-600 hover:bg-teal-50">Discover</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <a href="profile.html"
                        class="flex items-center justify-center w-9 h-9 rounded-full bg-slate-100 hover:bg-teal-100 text-slate-600 hover:text-teal-600 transition-colors border border-slate-200 shadow-sm group">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                        </svg>
                    </a>
                    <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>
                    <button onclick="API.logout()"
                        class="text-xs text-slate-500 hover:text-red-500 transition-colors uppercase tracking-widest font-bold">
                        Log Out
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="max-w-4xl mx-auto p-4 md:p-8 mt-6">
        <div
            class="glass-panel p-8 sm:p-10 rounded-2xl shadow-xl relative overflow-hidden bg-white/70 border border-slate-200">
            <div class="flex justify-between items-center mb-6">
                <div>
                    <h2 class="text-2xl font-bold text-slate-800 mb-1" id="pageTitle">Your Profile</h2>
                    <p class="text-sm text-slate-500" id="pageSubtitle">Manage your academic details and core
                        capabilities.</p>
                </div>
                <button type="button" id="editProfileBtn" onclick="enableEditMode()"
                    class="hidden btn-secondary px-6 py-2 rounded-lg text-sm font-bold tracking-wide">
                    Edit Profile
                </button>
            </div>

            <div id="success-message"
                class="hidden text-sm font-bold text-teal-700 bg-teal-100 px-4 py-3 rounded-xl mb-6 text-center border border-teal-200">
                Profile updated successfully
            </div>

            <form id="profileForm" class="space-y-8">
                <div id="error-message"
                    class="hidden text-sm font-bold text-red-500 bg-red-50 px-4 py-3 rounded-xl mb-4 text-center border border-red-200">
                </div>

                <!-- Academic Details -->
                <div>
                    <h3 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b border-slate-100">Academic Details
                    </h3>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div class="space-y-2 md:col-span-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Full
                                Name</label>
                            <input type="text" id="full_name" required
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm"
                                placeholder="E.g., Harshitha Kasaraneni" disabled>
                        </div>

                        <div class="space-y-2">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Course</label>
                            <select id="course" required
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex" disabled>
                                <option value="">Select Course...</option>
                                <option value="B.Tech (Bachelor of Technology)">B.Tech (Bachelor of Technology)</option>
                                <option value="B.E. (Bachelor of Engineering)">B.E. (Bachelor of Engineering)</option>
                                <option value="B.Sc. (Bachelor of Science)">B.Sc. (Bachelor of Science)</option>
                                <option value="BCA (Bachelor of Computer Applications)">BCA (Bachelor of Computer
                                    Applications)</option>
                                <option value="MCA (Master of Computer Applications)">MCA (Master of Computer
                                    Applications)</option>
                                <option value="M.Tech (Master of Technology)">M.Tech (Master of Technology)</option>
                                <option value="MBA (Master of Business Administration)">MBA (Master of Business
                                    Administration)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Department</label>
                            <select id="department" required
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex" disabled>
                                <option value="">Select Department...</option>
                                <option value="Computer Science & Engineering (CSE)">Computer Science & Engineering
                                    (CSE)</option>
                                <option value="Information Technology (IT)">Information Technology (IT)</option>
                                <option value="Electronics & Communication Engineering (ECE)">Electronics &
                                    Communication Engineering (ECE)</option>
                                <option value="Electrical & Electronics Engineering (EEE)">Electrical & Electronics
                                    Engineering (EEE)</option>
                                <option value="Mechanical Engineering (ME)">Mechanical Engineering (ME)</option>
                                <option value="Civil Engineering (CE)">Civil Engineering (CE)</option>
                                <option value="Chemical Engineering (CHE)">Chemical Engineering (CHE)</option>
                                <option value="Biotechnology (BT)">Biotechnology (BT)</option>
                                <option value="Aeronautical Engineering (AE)">Aeronautical Engineering (AE)</option>
                                <option value="Mechatronics (MCT)">Mechatronics (MCT)</option>
                                <option value="Architecture (ARCH)">Architecture (ARCH)</option>
                                <option value="Management (MBA/BBA)">Management (MBA/BBA)</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label
                                class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Specialization /
                                Focus Area</label>
                            <select id="specialization" required
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex" disabled>
                                <option value="">Select Specialization / Focus Area...</option>
                                <option value="Artificial Intelligence & Machine Learning (AI/ML)">Artificial
                                    Intelligence & Machine Learning (AI/ML)</option>
                                <option value="Data Science">Data Science</option>
                                <option value="Web Development">Web Development</option>
                                <option value="Mobile App Development">Mobile App Development</option>
                                <option value="Cybersecurity">Cybersecurity</option>
                                <option value="Cloud Computing">Cloud Computing</option>
                                <option value="Computer Networks">Computer Networks</option>
                                <option value="Embedded Systems">Embedded Systems</option>
                                <option value="IoT (Internet of Things)">IoT (Internet of Things)</option>
                                <option value="Robotics / Mechatronics">Robotics / Mechatronics</option>
                                <option value="Blockchain">Blockchain</option>
                                <option value="Full Stack Development">Full Stack Development</option>
                                <option value="Software Engineering">Software Engineering</option>
                                <option value="Game Development">Game Development</option>
                                <option value="UI/UX Design">UI/UX Design</option>
                                <option value="Digital Marketing">Digital Marketing</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Year of
                                Study</label>
                            <select id="year_of_study" required onchange="updateGraduationYear()"
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex" disabled>
                                <option value="">Select Year...</option>
                                <option value="1st Year">1st Year</option>
                                <option value="2nd Year">2nd Year</option>
                                <option value="3rd Year">3rd Year</option>
                                <option value="4th Year">4th Year</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="block text-xs font-bold text-slate-500 uppercase tracking-wider">Expected
                                Graduation Year</label>
                            <select id="graduation_year" required
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex" disabled>
                                <option value="">Select Year...</option>
                                <!-- Generated Dynamically -->
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Skills List -->
                <div>
                    <h3 class="text-lg font-bold text-slate-700 mb-4 pb-2 border-b border-slate-100">Your Selected
                        Skills</h3>
                    <div class="space-y-3">
                        <div class="relative" id="skillsInputContainer" style="display: none;">
                            <input type="text" id="skillsInput"
                                class="cyber-input w-full px-4 py-3 rounded-xl text-sm font-mono placeholder:font-sans"
                                placeholder="Type a skill and press Enter or select from suggestions"
                                onkeydown="handleSkillInput(event)">

                            <!-- Static Suggestions Box -->
                            <div class="mt-2 text-xs text-slate-500">
                                <p class="mb-1 font-bold">Suggested:</p>
                                <div id="suggestionsBox" class="flex flex-wrap gap-2">
                                    <!-- Populated by JS -->
                                </div>
                            </div>
                        </div>

                        <div id="skillsChipsContainer"
                            class="flex flex-wrap gap-2 min-h-[50px] p-3 bg-slate-50 rounded-xl border border-slate-200 shadow-inner">
                            <span id="noSkillsTxt" class="text-slate-400 text-sm italic py-1 px-2">You haven't added any
                                skills yet. Start typing or pick from suggestions.</span>
                        </div>
                    </div>
                </div>

                <!-- Save Action -->
                <div class="pt-6 mt-6 border-t border-slate-200" id="saveActionContainer" style="display: none;">
                    <button type="submit" id="saveBtn"
                        class="bg-teal-500 hover:bg-teal-400 text-white w-full py-4 rounded-xl font-bold tracking-wide transition-all shadow-lg hover:shadow-teal-500/50">
                        <span>Save Changes</span>
                    </button>
                    <button type="button" onclick="cancelEditMode()"
                        class="w-full mt-3 py-3 rounded-xl font-bold tracking-wide text-slate-500 hover:text-slate-800 transition-colors">
                        Cancel
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();

        // Globals
        let userSkills = [];
        let editMode = false;
        let isFirstTimeSetup = false;

        const suggestions = [
            'Python', 'Java', 'C++', 'JavaScript', 'React', 'FastAPI', 'Django',
            'Machine Learning', 'Data Science', 'AI', 'UI/UX Design', 'Web Development',
            'Mobile App Development', 'Blockchain', 'Cybersecurity', 'Cloud Computing',
            'DevOps', 'SQL / Databases', 'Git / Version Control'
        ];

        async function initPage() {
            try {
                // Determine if we need to load profile data based on login state
                const user = API.getUser();
                if (user && user.name) {
                    document.getElementById('full_name').value = user.name;
                }

                try {
                    const profileRes = await API.request('/profile');
                    // Existing user with profile returning -> Default to view mode
                    populateForm(profileRes);
                    userSkills = profileRes.skills || [];
                    renderSkillsList();

                    document.getElementById('editProfileBtn').classList.remove('hidden');
                    document.getElementById('pageTitle').innerText = "Your Profile";
                    document.getElementById('pageSubtitle').innerText = "View your active academic details and capabilities.";
                } catch (err) {
                    // Profile not found -> This is FIRST-TIME setup!
                    isFirstTimeSetup = true;
                    enableEditMode();
                    document.getElementById('editProfileBtn').classList.add('hidden');
                    // Hide the cancel button for compulsory first-time setup
                    document.querySelector('#saveActionContainer button[type="button"]').style.display = 'none';

                    document.getElementById('pageTitle').innerText = "Setup Profile";
                    document.getElementById('pageSubtitle').innerText = "Looks like you're new! Please complete your profile to continue.";
                }

                renderSuggestions();
            } catch (err) {
                console.error(err);
            }
        }

        function populateForm(data) {
            document.getElementById('full_name').value = data.full_name || '';
            document.getElementById('course').value = data.course || '';
            document.getElementById('department').value = data.department || '';

            // Re-populate graduation year dropdown first so it accepts the incoming value
            document.getElementById('year_of_study').value = data.year_of_study || '';
            updateGraduationYear();

            document.getElementById('graduation_year').value = data.graduation_year || '';

            // Handle specialization (check if it exists in standard options)
            const specSelect = document.getElementById('specialization');
            let found = false;
            for (let i = 0; i < specSelect.options.length; i++) {
                if (specSelect.options[i].value === data.specialization) {
                    found = true; break;
                }
            }
            if (!found && data.specialization) {
                // It was a custom specialization in previous versions, just append silently
                const opt = document.createElement('option');
                opt.value = data.specialization;
                opt.text = data.specialization;
                specSelect.appendChild(opt);
            }
            specSelect.value = data.specialization || '';
        }

        function enableEditMode() {
            editMode = true;
            document.querySelectorAll('#profileForm input, #profileForm select').forEach(el => {
                el.disabled = false;
            });
            document.getElementById('editProfileBtn').classList.add('hidden');
            document.getElementById('saveActionContainer').style.display = 'block';
            document.getElementById('skillsInputContainer').style.display = 'block';
            renderSkillsList();
        }

        function cancelEditMode() {
            if (isFirstTimeSetup) return; // Cannot cancel out of compulsory setup

            // Reload page to reset state simply
            window.location.reload();
        }

        function updateGraduationYear() {
            const yearOfStudy = document.getElementById('year_of_study').value;
            const gradSelect = document.getElementById('graduation_year');
            const currentAcademicYear = new Date().getFullYear();

            // Keep default option
            gradSelect.innerHTML = '<option value="">Select Year...</option>';

            if (!yearOfStudy) return;

            let offset = 0;
            if (yearOfStudy === '1st Year') offset = 4;
            else if (yearOfStudy === '2nd Year') offset = 3;
            else if (yearOfStudy === '3rd Year') offset = 2;
            else if (yearOfStudy === '4th Year') offset = 1;

            const expectedGradYear = currentAcademicYear + offset;

            const option = document.createElement('option');
            option.value = expectedGradYear;
            option.text = expectedGradYear;
            option.selected = true;
            gradSelect.appendChild(option);
        }

        /* --- Skills Chip Logic --- */
        function renderSuggestions() {
            const box = document.getElementById('suggestionsBox');
            box.innerHTML = '';
            suggestions.forEach(skill => {
                const btn = document.createElement('button');
                btn.type = 'button';
                btn.className = 'px-2 py-1 bg-white border border-slate-200 rounded-md hover:bg-teal-50 hover:text-teal-600 transition-colors cursor-pointer';
                btn.innerText = '+ ' + skill;
                btn.onclick = () => addSkill(skill);
                box.appendChild(btn);
            });
        }

        function handleSkillInput(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = e.target.value.trim();
                addSkill(val);
                e.target.value = '';
            }
        }

        function addSkill(skillName) {
            if (!skillName || !editMode) return;
            if (!userSkills.includes(skillName)) {
                userSkills.push(skillName);
                renderSkillsList();
            }
        }

        function removeSkill(skillName) {
            if (!editMode) return;
            userSkills = userSkills.filter(s => s !== skillName);
            renderSkillsList();
        }

        function renderSkillsList() {
            const container = document.getElementById('skillsChipsContainer');
            container.innerHTML = '';

            if (userSkills.length === 0) {
                if (editMode) {
                    container.innerHTML = `<span class="text-slate-400 text-sm italic py-1 px-2">You haven't added any skills yet. Start typing or pick from suggestions.</span>`;
                } else {
                    container.innerHTML = `<span class="text-slate-400 text-sm italic py-1 px-2">No skills actively indexed.</span>`;
                }
                return;
            }

            userSkills.forEach(val => {
                const div = document.createElement('div');
                div.className = `px-3 py-1.5 bg-teal-50 border border-teal-200 rounded-lg text-xs font-mono text-teal-700 flex items-center gap-2 shadow-sm`;

                const safeVal = val.replace(/'/g, "\\'");

                if (editMode) {
                    div.innerHTML = `
                        <span class="font-bold">${val}</span>
                        <button type="button" class="hover:text-red-500 hover:bg-red-50 rounded-full w-4 h-4 flex items-center justify-center transition-colors" onclick="removeSkill('${safeVal}')">&times;</button>
                    `;
                } else {
                    div.innerHTML = `<span class="font-bold">${val}</span>`;
                }

                container.appendChild(div);
            });
        }

        /* --- Main Submit Handling --- */
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const errorDiv = document.getElementById('error-message');
            const successDiv = document.getElementById('success-message');

            errorDiv.classList.add('hidden');
            successDiv.classList.add('hidden');
            btn.innerHTML = '<span>Saving...</span>';
            btn.disabled = true;

            const profileData = {
                name: document.getElementById('full_name').value,
                department: document.getElementById('department').value,
                year_of_study: document.getElementById('year_of_study').value,
                course: document.getElementById('course').value,
                specialization: document.getElementById('specialization').value,
                graduation_year: document.getElementById('graduation_year').value,
                skills: userSkills, // Send the collected skills
                interests: []
            };

            try {
                // Call the API which now handles DB storage of the profile and JSON skills Array
                await API.createProfile(profileData);

                successDiv.classList.remove('hidden');

                if (isFirstTimeSetup) {
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1500);
                } else {
                    // Turn off edit mode
                    editMode = false;
                    document.querySelectorAll('#profileForm input, #profileForm select').forEach(el => el.disabled = true);
                    document.getElementById('saveActionContainer').style.display = 'none';
                    document.getElementById('skillsInputContainer').style.display = 'none';
                    document.getElementById('editProfileBtn').classList.remove('hidden');

                    btn.innerHTML = '<span>Save Changes</span>';
                    btn.disabled = false;
                    renderSkillsList();
                }

            } catch (err) {
                errorDiv.textContent = err.message || "Failed to update profile.";
                errorDiv.classList.remove('hidden');
                btn.innerHTML = '<span>Save Changes</span>';
                btn.disabled = false;
            }
        });

        // Initialize!
        initPage();
    </script>
</body>

</html>
