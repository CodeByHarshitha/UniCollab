<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Profile | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body
    class="bg-[#020617] text-white min-h-screen relative overflow-x-hidden flex flex-col items-center justify-center p-4">

    <!-- Glowing Orbs -->
    <div
        class="fixed top-0 left-0 w-full h-full bg-[radial-gradient(ellipse_at_top,_var(--tw-gradient-stops))] from-indigo-900/20 via-[#020617]/0 to-transparent pointer-events-none z-0">
    </div>

    <div class="w-full max-w-3xl relative z-10">
        <!-- Onboarding Step Indicator -->
        <div class="flex items-center justify-center mb-10">
            <div class="flex flex-col items-center">
                <div
                    class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center text-white font-bold shadow-[0_0_15px_rgba(99,102,241,0.5)]">
                    1</div>
                <span class="text-xs font-medium text-indigo-400 mt-2 uppercase tracking-wide">Profile</span>
            </div>
            <div class="w-24 h-[2px] bg-slate-800 -mt-6 mx-2"></div>
            <div class="flex flex-col items-center">
                <div
                    class="w-10 h-10 rounded-full bg-slate-800 border-2 border-slate-700 flex items-center justify-center text-slate-500 font-bold">
                    2</div>
                <span class="text-xs font-medium text-slate-500 mt-2 uppercase tracking-wide">Skills & Interests</span>
            </div>
        </div>

        <div class="glass-panel p-8 sm:p-10 rounded-2xl shadow-2xl relative overflow-hidden">
            <h2 class="text-2xl font-bold text-white mb-2">Build Your Profile</h2>
            <p class="text-sm text-slate-400 mb-8 border-b border-white/5 pb-4">Set up your profile and start connecting
            </p>

            <form id="profileForm" class="space-y-6">
                <div id="error-message"
                    class="hidden text-sm font-bold text-red-400 bg-red-900/20 px-4 py-3 rounded-xl mb-4 text-center border border-red-500/30">
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Full Name</label>
                    <input type="text" id="full_name" required class="cyber-input w-full px-4 py-3 rounded-xl text-sm"
                        placeholder="E.g., Harshitha Kasaraneni">
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Year of
                            Study</label>
                        <select id="year_of_study" required
                            class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none flex">
                            <option value="">Select Year...</option>
                            <option value="1st Year">1st Year</option>
                            <option value="2nd Year">2nd Year</option>
                            <option value="3rd Year">3rd Year</option>
                            <option value="4th Year">4th Year</option>
                        </select>
                    </div>

                    <div class="space-y-2">
                        <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Expected
                            Graduation Year</label>
                        <select id="graduation_year" required
                            class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none">
                            <option value="">Select Year...</option>
                            <option value="2024">2024</option>
                            <option value="2025">2025</option>
                            <option value="2026">2026</option>
                            <option value="2027">2027</option>
                            <option value="2028">2028</option>
                        </select>
                    </div>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Department</label>
                    <select id="department" required
                        class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none">
                        <option value="">Select Department...</option>
                        <option value="Computer Science & Engineering (CSE)">Computer Science & Engineering (CSE)
                        </option>
                        <option value="Information Technology (IT)">Information Technology (IT)</option>
                        <option value="Electronics & Communication Engineering (ECE)">Electronics & Communication
                            Engineering (ECE)</option>
                        <option value="Electrical & Electronics Engineering (EEE)">Electrical & Electronics Engineering
                            (EEE)</option>
                        <option value="Mechanical Engineering (ME)">Mechanical Engineering (ME)</option>
                        <option value="Civil Engineering (CE)">Civil Engineering (CE)</option>
                        <option value="Chemical Engineering (CHE)">Chemical Engineering (CHE)</option>
                        <option value="Biotechnology (BT)">Biotechnology (BT)</option>
                        <option value="Aeronautical Engineering (AE)">Aeronautical Engineering (AE)</option>
                        <option value="Mechatronics (MCT)">Mechatronics (MCT)</option>
                        <option value="Architecture (ARCH)">Architecture (ARCH)</option>
                        <option value="Management (MBA/BBA)">Management (MBA/BBA)</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Course</label>
                    <select id="course" required
                        class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none">
                        <option value="">Select Course...</option>
                        <option value="B.Tech">B.Tech</option>
                        <option value="M.Tech">M.Tech</option>
                        <option value="BCA">BCA</option>
                        <option value="MCA">MCA</option>
                    </select>
                </div>

                <div class="space-y-2">
                    <label class="block text-xs font-medium text-slate-400 uppercase tracking-wider">Specialization /
                        Focus Area</label>
                    <select id="specialization" required
                        class="cyber-input w-full px-4 py-3 rounded-xl text-sm appearance-none">
                        <option value="">Select Specialization...</option>
                        <option value="Computer Science Engineering">Computer Science Engineering</option>
                        <option value="Artificial Intelligence">Artificial Intelligence</option>
                        <option value="Data Science">Data Science</option>
                        <option value="Cyber Security">Cyber Security</option>
                        <option value="General">General / None</option>
                    </select>
                </div>

                <div class="pt-6 mt-6 border-t border-white/5">
                    <button type="submit" id="saveBtn"
                        class="btn-primary w-full py-4 rounded-xl font-medium tracking-wide flex justify-center items-center gap-2">
                        <span>Save & Proceed</span>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();

        // Pre-fill name if available
        const user = API.getUser();
        if (user && user.name) {
            document.getElementById('full_name').value = user.name;
        }

        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('saveBtn');
            const errorDiv = document.getElementById('error-message');

            errorDiv.classList.add('hidden');
            btn.innerHTML = '<span>Saving...</span>';
            btn.disabled = true;

            const profileData = {
                name: document.getElementById('full_name').value,
                department: document.getElementById('department').value,
                year_of_study: document.getElementById('year_of_study').value,
                course: document.getElementById('course').value,
                specialization: document.getElementById('specialization').value,
                graduation_year: document.getElementById('graduation_year').value,
                skills: [],
                interests: []
            };

            try {
                await API.createProfile(profileData);
                window.location.href = 'skills.html';
            } catch (err) {
                errorDiv.textContent = err.message || "Failed to save profile.";
                errorDiv.classList.remove('hidden');
                btn.innerHTML = '<span>Save & Proceed</span>';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
