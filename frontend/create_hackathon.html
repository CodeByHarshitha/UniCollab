<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Organize Hackathon | UniCollab.</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="static/css/style.css">
</head>

<body class="bg-gradient-to-br from-lime-50 to-emerald-50 text-slate-800 min-h-screen">

    <nav class="sticky top-0 z-50 backdrop-blur-xl bg-white/80 border-b border-slate-200">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex items-center justify-between h-16">
                <!-- Left: Logo & Links -->
                <div class="flex items-center gap-8">
                    <!-- Brand -->
                    <a href="dashboard.html" class="flex items-center gap-2 group">
                        <img src="static/images/logo.svg" alt="logo"
                            class="w-6 h-6 group-hover:scale-110 transition-transform hidden">
                        <span
                            class="font-bold text-lg tracking-tight text-slate-800 group-hover:text-teal-600 transition-colors">UniCollab.</span>
                    </a>

                    <!-- App Navigation -->
                    <div class="flex items-center space-x-1">
                        <a href="dashboard.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-500 hover:text-blue-600 hover:bg-blue-50/50">Dashboard</a>
                        <a href="explore.html"
                            class="px-3 py-2 rounded-lg text-sm font-medium transition-colors text-slate-500 hover:text-teal-600 hover:bg-teal-50/50">Discover</a>
                    </div>
                </div>

                <!-- Right: User & Actions -->
                <div class="flex items-center gap-4">
                    <div
                        class="hidden sm:flex items-center gap-3 bg-white px-3 py-1.5 rounded-full border border-slate-200 shadow-sm">
                        <div
                            class="w-6 h-6 rounded-full bg-blue-100 border border-blue-200 flex justify-center items-center text-blue-600 font-bold text-[10px] uppercase">
                            <span id="nav-user-initial">U</span>
                        </div>
                        <span id="nav-user-name" class="text-sm font-bold text-slate-700"></span>
                    </div>
                    <div class="h-4 w-px bg-slate-200 hidden sm:block"></div>
                    <button onclick="API.logout()"
                        class="text-xs text-slate-500 hover:text-red-500 transition-colors uppercase tracking-widest font-bold">Log
                        Off</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto p-4 md:p-8 mt-6">

        <div class="mb-8">
            <a href="dashboard.html"
                class="text-xs font-bold text-slate-500 hover:text-teal-600 uppercase tracking-widest flex items-center gap-1 mb-4 transition-colors">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M10 19l-7-7m0 0l7-7m-7 7h18"></path>
                </svg>
                Back to Dashboard
            </a>
            <h1 class="text-3xl font-bold text-slate-800 tracking-tight">Organize Hackathon</h1>
            <p class="text-slate-500 mt-2">Set up a hackathon team, define your theme, and prepare for the event.</p>
        </div>

        <div
            class="glass-panel p-6 sm:p-8 rounded-2xl border-t-4 border-t-teal-500 shadow-xl bg-white/70 border border-slate-200 relative overflow-hidden">
            <div class="absolute -right-20 -top-20 w-64 h-64 bg-teal-500/5 rounded-full blur-3xl pointer-events-none">
            </div>

            <form id="standaloneHackathonForm" class="space-y-6 relative z-10">
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Hackathon
                        Name</label>
                    <input type="text" id="ih_name" required
                        class="cyber-input w-full px-4 py-3 rounded-lg text-sm text-slate-800 placeholder:text-slate-400"
                        placeholder="E.g., Web3 Innovators Hack">
                </div>
                <div class="space-y-2">
                    <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Description</label>
                    <textarea id="ih_desc" required
                        class="cyber-input w-full px-4 py-3 rounded-lg text-sm min-h-[120px] text-slate-800 placeholder:text-slate-400"
                        placeholder="Event goals, prizes, details, and what kind of roles you are seeking..."></textarea>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Theme</label>
                        <input type="text" id="ih_theme" required
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm text-slate-800 placeholder:text-slate-400"
                            placeholder="E.g., Decentralized Finance">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Tech Stack
                            (Optional)</label>
                        <div class="relative">
                            <input type="text" id="ih_techInput"
                                class="cyber-input w-full px-4 py-3 rounded-lg text-sm font-mono placeholder:font-sans text-slate-800 placeholder:text-slate-400 focus:border-teal-400 focus:shadow-[0_0_15px_rgba(20,184,166,0.1)] transition-all"
                                placeholder="Type tech & press Enter"
                                onkeydown="handleChipInput(event, 'ih_techInput', 'ih_techChipsContainer', 'ih_techChips')">
                            <div id="ih_techChipsContainer"
                                class="flex flex-wrap gap-2 mt-3 min-h-[44px] p-2 bg-slate-50 rounded-xl border border-slate-200">
                                <span class="text-slate-400 text-[10px] italic py-2 px-2" id="ih_techEmpty">No items
                                    added.</span>
                            </div>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Team Size
                            (Max)</label>
                        <input type="number" id="ih_size" required min="1" max="10"
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm text-slate-800" value="4">
                    </div>
                    <div class="space-y-2">
                        <label class="block text-xs font-bold text-slate-500 uppercase tracking-widest">Registration
                            Deadline</label>
                        <input type="date" id="ih_deadline" required
                            class="cyber-input w-full px-4 py-3 rounded-lg text-sm text-slate-600 pattern-date flex">
                    </div>
                </div>

                <!-- Error Display -->
                <div id="form-error"
                    class="hidden text-sm font-bold text-red-500 bg-red-50 p-3 rounded-lg border border-red-200 text-center">
                </div>

                <div class="pt-6 mt-6 border-t border-slate-200 flex justify-end gap-4">
                    <a href="dashboard.html"
                        class="px-6 py-3 rounded-xl text-sm font-bold text-slate-500 hover:text-slate-800 hover:bg-slate-100 transition-colors flex items-center justify-center">Cancel</a>
                    <button type="submit" id="ih_submitBtn"
                        class="bg-teal-500 hover:bg-teal-400 text-white px-8 py-3 rounded-xl text-sm font-bold tracking-wide shadow-[0_4px_14px_0_rgba(20,184,166,0.39)] hover:shadow-[0_6px_20px_rgba(20,184,166,0.23)] hover:-translate-y-0.5 transition-all flex items-center gap-2">
                        Launch Event
                        <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z"></path>
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        enforceAuth();
        const user = API.getUser();
        if (user && user.name) {
            document.getElementById('nav-user-name').innerText = user.name;
            document.getElementById('nav-user-initial').innerText = user.name.charAt(0).toUpperCase();
        }

        // State for Multi-Select Chips
        window.ih_techChips = [];

        function renderChips(containerId, arrayRefName) {
            const container = document.getElementById(containerId);
            const array = window[arrayRefName];
            const emptyTextId = containerId.replace('Container', 'Empty');
            const emptyEl = document.getElementById(emptyTextId);

            // Clear existing chips but keep empty hint if needed
            Array.from(container.children).forEach(child => {
                if (child.id !== emptyTextId) child.remove();
            });

            if (array.length === 0) {
                if (emptyEl) emptyEl.style.display = 'block';
            } else {
                if (emptyEl) emptyEl.style.display = 'none';
                array.forEach(item => {
                    const chip = document.createElement('div');
                    chip.className = 'px-3 py-1.5 bg-teal-50 border border-teal-200 rounded-lg text-xs font-bold text-teal-700 flex items-center gap-2 shadow-sm';
                    chip.innerHTML = `
                        <span>${item}</span>
                        <button type="button" class="w-4 h-4 rounded-full hover:bg-teal-200 flex justify-center items-center text-teal-600 transition-colors" onclick="removeChip('${item}', '${containerId}', '${arrayRefName}')">&times;</button>
                    `;
                    container.appendChild(chip);
                });
            }
        }

        window.removeChip = function (item, containerId, arrayRefName) {
            window[arrayRefName] = window[arrayRefName].filter(i => i !== item);
            renderChips(containerId, arrayRefName);
        }

        window.handleChipInput = function (e, inputId, containerId, arrayRefName) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const val = document.getElementById(inputId).value.trim();
                const array = window[arrayRefName];
                if (val && !array.includes(val)) {
                    array.push(val);
                    renderChips(containerId, arrayRefName);
                }
                document.getElementById(inputId).value = '';
            }
        }

        document.getElementById('standaloneHackathonForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('ih_submitBtn');
            const errorDiv = document.getElementById('form-error');

            const title = document.getElementById('ih_name').value;
            const desc = document.getElementById('ih_desc').value;
            const size = document.getElementById('ih_size').value;

            // In a real scenario you'd hit a createHackathon API endpoint, simulating success:
            btn.innerHTML = 'Filing Event...';
            btn.disabled = true;
            errorDiv.classList.add('hidden');

            try {
                // Simulate API Call wait
                await new Promise(r => setTimeout(r, 600));

                // Success animate
                btn.innerHTML = 'Event Live!';
                btn.classList.replace('bg-teal-500', 'bg-emerald-500');

                setTimeout(() => {
                    window.location.href = 'join_hackathon.html'; // Redirect to feed
                }, 1000);
            } catch (err) {
                errorDiv.innerText = err.message || "Failed to organize hackathon.";
                errorDiv.classList.remove('hidden');
                btn.innerHTML = 'Launch Event';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
