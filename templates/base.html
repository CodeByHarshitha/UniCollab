<!DOCTYPE html>
<html lang="en" class="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}UniCollab - Developer Platform{% endblock %}</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        background: '#020617',
                        card: 'rgba(17, 24, 39, 0.75)',
                        'card-hover': 'rgba(30, 41, 59, 0.85)',
                        primary: '#6366F1',
                        'primary-hover': '#4F46E5',
                        secondary: '#22D3EE',
                        highlight: '#A78BFA',
                        surface: '#0F172A',
                        'surface-light': '#1E293B',
                    },
                    boxShadow: {
                        'neon': '0 0 15px rgba(99, 102, 241, 0.3)',
                        'neon-secondary': '0 0 15px rgba(34, 211, 238, 0.3)',
                        'glow': '0 4px 20px rgba(0, 0, 0, 0.5)',
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.3s ease-out',
                        'slide-up': 'slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1)',
                    },
                    keyframes: {
                        fadeIn: {
                            '0%': { opacity: '0' },
                            '100%': { opacity: '1' },
                        },
                        slideUp: {
                            '0%': { transform: 'translateY(10px)', opacity: '0' },
                            '100%': { transform: 'translateY(0)', opacity: '1' },
                        }
                    }
                }
            }
        }
    </script>

    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
        rel="stylesheet">

    <!-- Custom Base Styles -->
    <link rel="stylesheet" href="{{ url_for('static', path='/css/style.css') }}">

    {% block head %}{% endblock %}
</head>

<body class="flex h-screen overflow-hidden antialiased">

    <!-- Global Decorative Backgrounds -->
    <div class="app-bg-grid"></div>
    <div class="app-bg-glow"></div>

    <!-- LEFT SIDEBAR -->
    {% include "components/sidebar.html" %}

    <!-- MAIN CONTENT VIEWER -->
    <main class="flex-1 flex flex-col min-w-0 relative z-10">

        {% include "components/navbar.html" %}

        <!-- Dynamic Page Content -->
        <div class="flex-1 overflow-y-auto p-6 lg:p-10 hide-scrollbar">
            <div class="max-w-7xl mx-auto animate-fade-in">
                {% block content %}{% endblock %}
            </div>
        </div>
    </main>

    <script src="{{ url_for('static', path='/js/app.js') }}"></script>
    {% block scripts %}{% endblock %}
</body>

</html>
