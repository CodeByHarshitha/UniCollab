<header class="h-16 flex items-center justify-between px-6 border-b border-white/5 bg-surface/30 backdrop-blur-md">

    <!-- Mobile Menu Toggle (Hidden on Desktop) -->
    <button class="md:hidden text-slate-400 hover:text-white flex items-center gap-3">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16">
            </path>
        </svg>
        <span class="text-xl font-bold tracking-tight text-white/90">UniCollab.</span>
    </button>

    <!-- Brand / Logo Area -->
    <div class="hidden md:flex items-center gap-2">
        <span class="text-xl font-bold tracking-tight text-white/90">UniCollab.</span>
    </div>

    <!-- Header Actions -->
    <div class="flex items-center gap-6">
        {% block global_actions %}{% endblock %}

        <!-- Profile Icon -->
        <a href="/profile" class="flex items-center gap-2 group">
            <div
                class="w-9 h-9 rounded-full bg-gradient-to-tr from-indigo-500 to-cyan-400 p-[2px] group-hover:shadow-[0_0_15px_rgba(34,211,238,0.4)] transition-all">
                <div
                    class="w-full h-full bg-surface rounded-full flex items-center justify-center text-sm font-bold text-white relative">
                    {{ email[0] | upper if email else 'U' }}
                    <div
                        class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full bg-cyan-400 border-2 border-surface animate-pulse">
                    </div>
                </div>
            </div>
            <span
                class="hidden sm:block text-sm font-medium text-slate-300 group-hover:text-white transition-colors">Profile</span>
        </a>

        <!-- Log Out Button -->
        <a href="/logout"
            class="hidden sm:flex items-center gap-2 text-sm font-medium text-rose-400 hover:text-rose-300 hover:bg-rose-500/10 px-3 py-1.5 rounded-lg transition-colors border border-transparent hover:border-rose-500/20">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                    d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1">
                </path>
            </svg>
            Log Out
        </a>
    </div>
</header>
